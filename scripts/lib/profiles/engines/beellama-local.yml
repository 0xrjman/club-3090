schema_version: 1
id: beellama-local
display_name: beellama.cpp local CUDA server (DFlash + windowed KV)
type: llama.cpp
stability: experimental
install:
  method: docker_image
  # Single source of truth for the beellama image — switch.sh/launch.sh inject this as
  # BEELLAMA_IMAGE across all beellama composes (the per-compose ${BEELLAMA_IMAGE:-…} literal
  # is only a fallback for direct `docker compose`). Bump this ONE line to update (beellama-pin-bump).
  # v0.3.1 CUDA13 — tagged release with native sm_120 support.
  spec: ghcr.io/anbeeld/beellama.cpp:server-cuda13-v0.3.1
min_sm: 6.0
supported_model_families:
  - qwen3-next-hybrid
  - qwen3-next-moe
  - gemma4-swa-dense
  - gemma4-unified
features: {}
supported_kv_formats:
  - q4_0
  - q4_1
  - q5_0
  - q8_0
supported_drafters:
  - dflash
  - mtp
  - mtp_gguf   # GGUF embedded MTP head via `--spec-type draft-mtp` (unsloth-mtp-gguf drafter; beellama/qwen-mtp-dual)
supported_weight_formats:
  - gguf
required_overlays: []
vendored_overlays: []
required_genesis: false
notes: "Anbeeld's llama.cpp fork — adds DFlash spec-dec and SWA windowed KV. install.spec pins multiarch-v0.3.0-efe856397 for 5090 sm_120 support."
