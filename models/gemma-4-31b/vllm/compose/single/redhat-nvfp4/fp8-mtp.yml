# ===========================================================================
# Profile (at-a-glance):
#   Model:     Gemma 4 31B (RedHatAI NVFP4 — Blackwell FP4 tensor core native)
#   Topology:  Single 5090 (TP=1, sm_120 Blackwell, 32 GB)
#   Drafter:   MTP n=4 (Google's official `gemma-4-31B-it-assistant`, BF16 0.5B)
#   KV:        FP8 (Blackwell-native, auto-detected by vLLM)
#   Vision:    yes (SigLIP vision tower preserved)
#   Max ctx:   TBD — NVFP4 weights ~21.7 GB, expect 80K+ ctx with FP8 KV
#   Genesis:   N/A
#   Status:    🧪 Experimental — first NVFP4 compose on club-3090
#              Based on vllm/gemma-int8-5090, adapted for NVFP4:
#                - CUDA 13 nightly (NVFP4 requires Blackwell FP4 TC kernels)
#                - No PR #40391 (INT8 PTH-specific, NVFP4 uses default FP8 KV)
#                - No --kv-cache-dtype override (auto FP8 on Blackwell)
#   Best for:  Max TPS on single 5090 via Blackwell FP4 tensor core compute
# ---------------------------------------------------------------------------
services:
  vllm-gemma-4-31b-nvfp4-5090:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:cu130-nightly}
    container_name: "${ESTATE_CONTAINER:-vllm-gemma-4-31b-nvfp4-5090}"
    restart: unless-stopped
    ports:
      - "${ESTATE_PORT:-${PORT:-8020}}:8000"
    volumes:
      - ${MODEL_DIR:-../../../../../../models-cache}:/root/.cache/huggingface
      - ../../../cache/torch_compile_nvfp4_tp1:/root/.cache/vllm/torch_compile_cache
      - ../../../cache/triton_nvfp4_tp1:/root/.triton/cache
      # PR #42006 — Gemma 4 MTP streaming multi-tool-call fix
      - ../../../patches/vllm-pr42006-v0.22.0:/etc/club3090/pr42006:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=${ESTATE_GPUS:-0}
      - HUGGING_FACE_HUB_TOKEN=***      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - VLLM_NO_USAGE_STATS=1
      - OMP_NUM_THREADS=1
      - PYTORCH_CUDA_ALLOC_CONF=${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True,max_split_size_mb:512}
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - TRITON_CACHE_DIR=/root/.triton/cache
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${ESTATE_GPUS:-0}"]
              capabilities: [gpu]
    entrypoint:
      - /bin/bash
      - -c
      - |
        # PR #42006 (Gemma 4 streaming multi-tool-call fix).
        bash /etc/club3090/pr42006/install.sh
        exec vllm serve "$@"
      - --
    command:
      - --override-generation-config
      - '{"temperature":${TEMP:-${TEMPERATURE:-1.0}},"top_p":${TOP_P:-0.95},"top_k":${TOP_K:-64},"min_p":${MIN_P:-0.0},"repetition_penalty":${REPEAT_PENALTY:-1.0}}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - /root/.cache/huggingface/RedHatAI/gemma-4-31B-it-NVFP4
      - --served-model-name
      - ${MODEL_ALIAS:-qwen3.6}
      - --tensor-parallel-size
      - "${TP:-1}"
      - --max-model-len
      - "${MAX_MODEL_LEN:-${CTX:-65536}}"
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTILIZATION:-0.95}"
      - --max-num-seqs
      - "${MAX_NUM_SEQS:-1}"
      - --trust-remote-code
      - --enable-auto-tool-choice
      - --tool-call-parser
      - gemma4
      - --reasoning-parser
      - gemma4
      - --chat-template
      - /vllm-workspace/examples/tool_chat_template_gemma4.jinja
      - --speculative-config
      - '{"model":"/root/.cache/huggingface/gemma-4-31b-it-assistant","num_speculative_tokens":${SPEC_N_MAX:-4}}'
