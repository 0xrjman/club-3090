# ===========================================================================
# Profile (at-a-glance):
#   Model:     Gemma 4 31B (Intel AutoRound INT4)
#   Topology:  Single 5090 (TP=1, sm_120 Blackwell, 32 GB)
#   Drafter:   MTP n=4 (Google's official `gemma-4-31B-it-assistant`, BF16 0.5B)
#   KV:        int8_per_token_head (1 byte/token)
#   Vision:    yes
#   Max ctx:   262144 (single 5090, INT8 PTH pool ~2× BF16, fits easily)
#   Genesis:   N/A
#   Status:    🧪 Experimental — 5090 single-card adaptation of vllm/gemma-int8-mtp
#              (dual 3090 TP=2). Same AutoRound INT4 weights + Google MTP drafter,
#              but TP=1 on 5090 sm_120. INT8 PTH KV compatible with sm_120 per
#              the hardware table in the dual compose. Not yet validated on this
#              specific config.
#   Caveats:   Uses vLLM v0.22.0 stock image. PR #40391 overlay still required
#              for INT8 PTH on Gemma-4 (mixed head_dim 256/512). If boot fails,
#              try removing --kv-cache-dtype to fall back to BF16 KV (lower ctx).
#   Best for:  Single RTX 5090 Gemma-4-31B with full 262K + vLLM stability + MTP
# ---------------------------------------------------------------------------
# Gemma-4-31B-it (Intel AutoRound INT4) + Google MTP "assistant" drafter
# Single 5090 TP=1 + per-token-head INT8 KV + 262K ctx.
#
# Based on the dual compose (dual/autoround-int4/int8.yml), adapted for
# single 5090 (sm_120 Blackwell, 32 GB). INT8 PTH runs on every consumer
# GPU including sm_86 Ampere and sm_120 Blackwell.
#
# Models:
#   target: Intel/gemma-4-31B-it-int4-AutoRound (21.2 GB)
#   draft : google/gemma-4-31B-it-assistant      (0.5B / 927 MB BF16)
#
# Vendored overlays (same as dual):
#   vLLM PR #40391 — gemma4 per-token-head KV page-size alignment
#   vLLM PR #42006 — Gemma 4 MTP streaming multi-tool-call fix
services:
  vllm-gemma-4-31b-mtp-int8-5090:
    image: ${VLLM_IMAGE:-vllm/vllm-openai:v0.22.0}
    container_name: "${ESTATE_CONTAINER:-vllm-gemma-4-31b-mtp-int8-5090}"
    restart: unless-stopped
    ports:
      - "${ESTATE_PORT:-${PORT:-8021}}:8000"
    volumes:
      - ${MODEL_DIR:-../../../../../../models-cache}:/root/.cache/huggingface
      # torch.compile + Triton kernel caches (separate from dual int8 cache).
      - ../../../cache/torch_compile_int8_tp1:/root/.cache/vllm/torch_compile_cache
      - ../../../cache/triton_int8_tp1:/root/.triton/cache
      # ---- vLLM PR #40391 — INT8 PTH on Gemma-4 (still open upstream) ----
      - ../../../patches/vllm-pr40391-v0.22.0:/etc/club3090/pr40391:ro
      # vLLM PR #42006 — Gemma 4 MTP streaming multi-tool-call fix
      - ../../../patches/vllm-pr42006-v0.22.0:/etc/club3090/pr42006:ro
    environment:
      - NVIDIA_VISIBLE_DEVICES=${ESTATE_GPUS:-${CUDA_VISIBLE_DEVICES:-0}}
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - VLLM_WORKER_MULTIPROC_METHOD=spawn
      - VLLM_NO_USAGE_STATS=1
      - OMP_NUM_THREADS=1
      - PYTORCH_CUDA_ALLOC_CONF=${PYTORCH_CUDA_ALLOC_CONF:-expandable_segments:True,max_split_size_mb:512}
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=1
      - TRITON_CACHE_DIR=/root/.triton/cache
    shm_size: "16gb"
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${ESTATE_GPUS:-${CUDA_VISIBLE_DEVICES:-0}}"]
              capabilities: [gpu]
    entrypoint:
      - /bin/bash
      - -c
      - |
        # vLLM PR #40391 (Gemma 4 per-token-head KV) — apply lean diff.
        bash /etc/club3090/pr40391/install.sh
        # vLLM PR #42006 (Gemma 4 streaming multi-tool-call fix).
        bash /etc/club3090/pr42006/install.sh
        # Single card — no NVLink detection needed, no custom-all-reduce.
        exec vllm serve "$@"
      - --
    command:
      - --override-generation-config
      - '{"temperature":${TEMP:-${TEMPERATURE:-1.0}},"top_p":${TOP_P:-0.95},"top_k":${TOP_K:-64},"min_p":${MIN_P:-0.0},"repetition_penalty":${REPEAT_PENALTY:-1.0}}'
      - --host
      - 0.0.0.0
      - --port
      - "8000"
      - --model
      - /root/.cache/huggingface/gemma-4-31b-autoround-int4
      - --served-model-name
      - ${MODEL_ALIAS:-qwen3.6}
      - --tensor-parallel-size
      - "${TP:-1}"
      - --pipeline-parallel-size
      - "${PP:-1}"
      - --kv-cache-dtype
      - "${KV_DTYPE:-int8_per_token_head}"
      - --max-model-len
      - "${MAX_MODEL_LEN:-${CTX:-262144}}"
      - --gpu-memory-utilization
      - "${GPU_MEMORY_UTILIZATION:-0.92}"
      - --max-num-seqs
      - "${MAX_NUM_SEQS:-1}"
      - --max-num-batched-tokens
      - "4096"
      - --trust-remote-code
      - --enable-auto-tool-choice
      - --tool-call-parser
      - gemma4
      - --reasoning-parser
      - gemma4
      - --chat-template
      - /vllm-workspace/examples/tool_chat_template_gemma4.jinja
      - --speculative-config
      - '{"model":"/root/.cache/huggingface/gemma-4-31b-it-assistant","num_speculative_tokens":${SPEC_N_MAX:-4}}'
